<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <!-- Dark gradient background -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="50%" stop-color="#16213e"/>
      <stop offset="100%" stop-color="#0f3460"/>
    </linearGradient>
    <!-- Accent gradient for decorative elements -->
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c96442"/>
      <stop offset="100%" stop-color="#e8845a"/>
    </linearGradient>
    <!-- Paddle gradient -->
    <linearGradient id="paddle-g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c96442"/>
      <stop offset="100%" stop-color="#a84e30"/>
    </linearGradient>
    <!-- Badge gradient -->
    <linearGradient id="badge-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(201,100,66,0.2)"/>
      <stop offset="100%" stop-color="rgba(201,100,66,0.08)"/>
    </linearGradient>
    <!-- Subtle grid pattern -->
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#c96442" stroke-width="0.3" opacity="0.08"/>
    </pattern>
    <!-- Glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid overlay -->
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Large decorative arc trajectory lines -->
  <path d="M -50,500 Q 300,100 600,350 T 1300,200" stroke="#c96442" stroke-width="1" opacity="0.06" fill="none"/>
  <path d="M -50,350 Q 400,600 800,250 T 1300,500" stroke="#c96442" stroke-width="0.8" opacity="0.04" fill="none"/>

  <!-- Ambient glow behind paddle area -->
  <circle cx="200" cy="315" r="160" fill="#c96442" opacity="0.04" filter="url(#softglow)"/>

  <!-- Paddle icon (large, left side) -->
  <g transform="translate(120, 200) rotate(-15, 75, 90)">
    <!-- Paddle rubber face -->
    <ellipse cx="75" cy="85" rx="60" ry="68" fill="url(#paddle-g)" opacity="0.9"/>
    <!-- Highlight on rubber -->
    <ellipse cx="60" cy="65" rx="35" ry="42" fill="none" stroke="#d8784e" stroke-width="2" opacity="0.3"/>
    <!-- Handle -->
    <rect x="55" y="148" width="40" height="60" rx="10" fill="#8b5e3c"/>
    <rect x="55" y="148" width="40" height="60" rx="10" fill="none" stroke="#7a4f30" stroke-width="1"/>
    <!-- Grip lines -->
    <line x1="63" y1="162" x2="87" y2="162" stroke="#7a4f30" stroke-width="1.5" opacity="0.5"/>
    <line x1="63" y1="174" x2="87" y2="174" stroke="#7a4f30" stroke-width="1.5" opacity="0.5"/>
    <line x1="63" y1="186" x2="87" y2="186" stroke="#7a4f30" stroke-width="1.5" opacity="0.5"/>
  </g>

  <!-- Ball with trail -->
  <circle cx="310" cy="240" r="6" fill="#c96442" opacity="0.12"/>
  <circle cx="295" cy="265" r="8" fill="#c96442" opacity="0.2"/>
  <circle cx="282" cy="295" r="10" fill="#c96442" opacity="0.35"/>
  <circle cx="272" cy="325" r="13" fill="#c96442" opacity="0.85"/>
  <circle cx="268" cy="320" r="4.5" fill="#fff" opacity="0.3"/>

  <!-- Motion lines -->
  <line x1="100" y1="180" x2="130" y2="190" stroke="#c96442" stroke-width="2" opacity="0.15" stroke-linecap="round"/>
  <line x1="90" y1="210" x2="125" y2="215" stroke="#c96442" stroke-width="2.5" opacity="0.2" stroke-linecap="round"/>
  <line x1="95" y1="240" x2="128" y2="240" stroke="#c96442" stroke-width="2" opacity="0.15" stroke-linecap="round"/>

  <!-- Title: "Pong News" -->
  <text x="420" y="230" font-family="Georgia, 'Times New Roman', serif" font-size="82" font-weight="bold" fill="#f5f0eb" letter-spacing="-1">
    Pong News
  </text>

  <!-- Subtitle -->
  <text x="424" y="278" font-family="Georgia, 'Times New Roman', serif" font-size="26" font-weight="normal" fill="#c9a88e" letter-spacing="2">
    Science-Backed Table Tennis Health
  </text>

  <!-- Accent line under subtitle -->
  <rect x="424" y="296" width="320" height="2" rx="1" fill="url(#accent)" opacity="0.6"/>

  <!-- Stat Badge 1: +9.7 Years -->
  <g transform="translate(424, 340)">
    <rect width="220" height="80" rx="12" fill="url(#badge-bg)" stroke="#c96442" stroke-width="1" opacity="0.8"/>
    <text x="110" y="38" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="32" font-weight="bold" fill="#e8845a">
      +9.7 Years
    </text>
    <text x="110" y="62" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="13" fill="#c9a88e" letter-spacing="1">
      LIFE EXPECTANCY BOOST
    </text>
  </g>

  <!-- Stat Badge 2: 47% Lower Mortality -->
  <g transform="translate(670, 340)">
    <rect width="260" height="80" rx="12" fill="url(#badge-bg)" stroke="#c96442" stroke-width="1" opacity="0.8"/>
    <text x="130" y="38" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="32" font-weight="bold" fill="#e8845a">
      47% Lower Mortality
    </text>
    <text x="130" y="62" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="13" fill="#c9a88e" letter-spacing="1">
      LONG-TERM HEALTH BENEFIT
    </text>
  </g>

  <!-- Bottom tagline -->
  <text x="424" y="480" font-family="'Helvetica Neue', Arial, sans-serif" font-size="15" fill="#8a9ab5" letter-spacing="0.5">
    Peer-reviewed research on the health benefits of table tennis
  </text>

  <!-- Decorative dots bottom right -->
  <circle cx="1100" cy="560" r="2" fill="#c96442" opacity="0.15"/>
  <circle cx="1120" cy="570" r="1.5" fill="#c96442" opacity="0.1"/>
  <circle cx="1135" cy="555" r="2.5" fill="#c96442" opacity="0.12"/>
  <circle cx="1155" cy="565" r="1.8" fill="#c96442" opacity="0.08"/>
  <circle cx="1168" cy="550" r="2" fill="#c96442" opacity="0.1"/>

  <!-- Top-right decorative line -->
  <line x1="900" y1="50" x2="1150" y2="50" stroke="#c96442" stroke-width="0.8" opacity="0.15"/>
  <line x1="950" y1="60" x2="1100" y2="60" stroke="#c96442" stroke-width="0.5" opacity="0.1"/>
</svg>
