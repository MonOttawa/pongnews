name: Bug Report
description: Report something that is broken
labels: ["bug", "priority-med"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the issue clearly. What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: How can we trigger this again?
      placeholder: |
        1. Run command X
        2. ...
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / error output
      description: Paste relevant logs or error messages
      render: shell
    validations:
      required: false
  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - Critical (blocks production)
        - High (major functionality broken)
        - Medium (workaround exists)
        - Low (cosmetic / minor)
    validations:
      required: true
